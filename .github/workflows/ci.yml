name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Build & Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: |
            web/pnpm-lock.yaml
            themes/default/pnpm-lock.yaml

      - name: Install admin dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Build admin
        run: pnpm --dir web build

      - name: Install default theme dependencies
        run: pnpm --dir themes/default install --frozen-lockfile

      - name: Build default theme
        run: pnpm --dir themes/default build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --all-targets --locked

      - name: Test
        run: cargo test --locked
